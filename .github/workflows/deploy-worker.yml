name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches:
      - webforge-v4-upgrade
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-worker.yml'

permissions:
  contents: read

concurrency:
  group: webforge-worker-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy WebForge API
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check backend
        run: npm --prefix apps/api run typecheck

      - name: Deploy production Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Verify live authentication route
        run: |
          sleep 10

          HEALTH_CODE="$(curl -sS -o /tmp/health.json -w '%{http_code}' \
            'https://website-maker-ai-api.poojakpdoshi.workers.dev/health')"

          cat /tmp/health.json
          echo

          if [ "$HEALTH_CODE" != "200" ]; then
            echo "Health check failed with HTTP $HEALTH_CODE"
            exit 1
          fi

          AUTH_CODE="$(curl -sS -o /tmp/auth.json -w '%{http_code}' \
            'https://website-maker-ai-api.poojakpdoshi.workers.dev/auth/me')"

          cat /tmp/auth.json
          echo

          if [ "$AUTH_CODE" != "401" ]; then
            echo "Expected /auth/me to return 401 but received $AUTH_CODE"
            exit 1
          fi

          echo "WebForge username authentication is live."
