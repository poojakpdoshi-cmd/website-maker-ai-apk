name: Configure Vercel OAuth

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Upload Vercel integration secrets
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLIENT_ID: ${{ secrets.WEBFORGE_VERCEL_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.WEBFORGE_VERCEL_CLIENT_SECRET }}
          REDIRECT_URI: ${{ secrets.WEBFORGE_VERCEL_REDIRECT_URI }}
          INTEGRATION_SLUG: ${{ secrets.WEBFORGE_VERCEL_INTEGRATION_SLUG }}
        run: |
          printf "%s" "$CLIENT_ID" | npx wrangler secret put VERCEL_CLIENT_ID
          printf "%s" "$CLIENT_SECRET" | npx wrangler secret put VERCEL_CLIENT_SECRET
          printf "%s" "$REDIRECT_URI" | npx wrangler secret put VERCEL_REDIRECT_URI
          printf "%s" "$INTEGRATION_SLUG" | npx wrangler secret put VERCEL_INTEGRATION_SLUG

      - name: Deploy Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
