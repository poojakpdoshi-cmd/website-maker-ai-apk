name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - webforge-v4-upgrade
    paths:
      - 'apps/mobile/**'
      - 'apps/api/**'
      - 'apps/api-node/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: read

concurrency:
  group: webforge-v4-apk
  cancel-in-progress: true

jobs:
  build:
    name: Build WebForge V4.2 APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout exact branch commit
        uses: actions/checkout@v4

      - name: Show build identity
        run: |
          echo "Branch: $GITHUB_REF_NAME"
          echo "Commit: $GITHUB_SHA"
          git log -1 --oneline

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify WebForge source
        run: |
          test -f apps/mobile/assets/icon.png
          test -f apps/mobile/public/webforge-logo.svg

          grep -n "readResponse" apps/mobile/src/App.tsx
          grep -n "full_stack_report" apps/mobile/src/App.tsx
          grep -n "V4.2.*CHAT BUILD" apps/mobile/src/App.tsx

          grep -n ">Setup<\|Connection settings" \
            apps/mobile/src/App.tsx && exit 1 || true

      - name: Run project checks
        run: |
          npm run typecheck
          npm test
          npm --prefix apps/api run typecheck

      - name: Build mobile frontend
        run: npm run build -w @wmai/mobile

      - name: Generate branded Android project
        working-directory: apps/mobile
        run: |
          rm -rf android

          cp -f assets/icon-only.png assets/icon.png

          npx cap add android
          npx capacitor-assets generate --android
          npx cap sync android

          sed -i 's/versionCode 1/versionCode 42/' \
            android/app/build.gradle

          sed -i 's/versionName "1.0"/versionName "4.2.0"/' \
            android/app/build.gradle

          echo "===== ANDROID VERSION ====="
          grep -n "versionCode\|versionName" \
            android/app/build.gradle

          echo "===== GENERATED ICONS ====="
          find android/app/src/main/res \
            -type f \
            \( -name 'ic_launcher*.png' -o -name 'ic_launcher*.xml' \) \
            -print

          ICON_COUNT="$(find android/app/src/main/res \
            -type f \
            \( -name 'ic_launcher*.png' -o -name 'ic_launcher*.xml' \) \
            | wc -l)"

          if [ "$ICON_COUNT" -lt 1 ]; then
            echo "No Android launcher icons were generated."
            exit 1
          fi

      - name: Build completely clean APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon

          SHORT_SHA="${GITHUB_SHA::7}"

          cp \
            app/build/outputs/apk/debug/app-debug.apk \
            "$GITHUB_WORKSPACE/WebForge-Ai-V4.2-${SHORT_SHA}.apk"

      - name: Upload uniquely named APK
        uses: actions/upload-artifact@v4
        with:
          name: WebForge-Ai-V4.2-${{ github.run_number }}
          path: WebForge-Ai-V4.2-*.apk
          if-no-files-found: error
