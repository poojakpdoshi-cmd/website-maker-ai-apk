name: Build Nexora Native APK

on:
  workflow_dispatch:
  push:
    branches:
      - nexora-redesign
    paths:
      - "apps/android-native/**"
      - ".github/workflows/build-native-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: apps/android-native
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nexora-Native-Phase1
          path: apps/android-native/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
