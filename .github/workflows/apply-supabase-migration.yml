name: Apply Supabase Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply full-stack report migration
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          test -n "$SUPABASE_DB_URL"
          for migration in \
            supabase/migrations/006_website_cms.sql \
            supabase/migrations/007_cms_media_library.sql \
            supabase/migrations/008_cms_scheduled_publishing.sql \
            supabase/migrations/009_full_stack_report.sql
          do
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done
